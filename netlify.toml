[build]
  publish = "."
  command = ""

# Ensure correct content types and caching behavior for questions JSON
[[headers]]
  for = "/questions/*.json"
  [headers.values]
    Cache-Control = "no-store"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(self), microphone=()"

# SPA fallback not required, but if you later add routes, uncomment:
# [[redirects]]
#   from = "/*"
#   to = "/index.html"
#   status = 200
